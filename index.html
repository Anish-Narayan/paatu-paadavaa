<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Music Player</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        .app-container {
            display: grid;
            grid-template-columns: 260px 1fr;
            grid-template-rows: 1fr 90px;
            height: 100vh;
        }
        
        /* Sidebar Styling */
        .sidebar {
            background-color: #000000;
            padding: 24px 12px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            padding-left: 8px;
            margin-bottom: 10px;
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 16px;
            color: #b3b3b3;
            font-size: 14px;
            font-weight: bold;
            padding: 10px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: color 0.2s, background-color 0.2s;
        }
        .menu-item:hover, .menu-item.active {
            color: #ffffff;
        }
        .menu-item.active {
            background-color: #282828;
        }
        .playlist-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
            border-top: 1px solid #282828;
            padding-top: 16px;
            overflow-y: auto;
        }
        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #b3b3b3;
            font-weight: bold;
            padding-left: 12px;
        }
        .playlist-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .playlist-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .playlist-item:hover {
            background-color: #1a1a1a;
        }
        .playlist-item.active {
            background-color: #282828;
        }
        .playlist-item.active .track-title {
            color: #1db954;
        }
        .track-index {
            font-size: 14px;
            color: #b3b3b3;
            width: 20px;
            text-align: center;
        }
        .playlist-item.active .track-index {
            color: #1db954;
        }
        .track-meta {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .track-title {
            font-size: 14px;
            font-weight: 500;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .track-sub {
            font-size: 12px;
            color: #b3b3b3;
        }

        /* Main Window Styling */
        .main-content {
            background: linear-gradient(to bottom, #1e1e1e 0%, #121212 100%);
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .now-playing-jumbo {
            display: flex;
            align-items: flex-end;
            gap: 28px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }
        .album-art-large {
            width: 250px;
            height: 250px;
            background-color: #282828;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #535353;
        }
        .track-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .type-label {
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #1db954;
        }
        #jumbo-title {
            font-size: 48px;
            font-weight: 800;
            line-height: 1.1;
        }
        #jumbo-subtitle {
            font-size: 16px;
            color: #b3b3b3;
        }

        /* Footer Player Bar Styling */
        .player-bar {
            grid-column: 1 / span 2;
            background-color: #181818;
            border-top: 1px solid #282828;
            display: grid;
            grid-template-columns: 30% 40% 30%;
            align-items: center;
            padding: 0 24px;
        }
        .now-playing-bar-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .mini-art {
            width: 56px;
            height: 56px;
            background-color: #282828;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #a7a7a7;
        }
        .track-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .track-name {
            font-size: 14px;
            font-weight: 500;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .track-artist {
            font-size: 12px;
            color: #b3b3b3;
        }
        .now-playing-bar-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .control-btn {
            background: none;
            border: none;
            color: #b3b3b3;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s, transform 0.1s;
        }
        .control-btn:hover {
            color: #ffffff;
        }
        .control-btn:active {
            transform: scale(0.95);
        }
        .play-pause-btn {
            background-color: #ffffff;
            color: #000000;
            width: 38px;
            height: 38px;
            border-radius: 50%;
        }
        .play-pause-btn:hover {
            background-color: #f0f0f0;
            transform: scale(1.05);
        }
        .control-btn.active-state {
            color: #1db954;
        }
        .progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        .time {
            font-size: 11px;
            color: #b3b3b3;
            width: 40px;
        }
        #time-current { text-align: right; }
        #time-duration { text-align: left; }

        .now-playing-bar-right {
            display: flex;
            justify-content: flex-end;
        }
        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 140px;
        }
        .control-btn-volume {
            background: none;
            border: none;
            color: #b3b3b3;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }
        .control-btn-volume:hover {
            color: #ffffff;
        }

        /* Sleek slider styling matching Spotify */
        input[type="range"] {
            -webkit-appearance: none;
            background: linear-gradient(to right, #1db954 0%, #535353 0%);
            border-radius: 4px;
            height: 4px;
            outline: none;
            cursor: pointer;
            width: 100%;
            transition: background 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
            opacity: 0;
            transition: opacity 0.1s;
        }
        input[type="range"]:hover::-webkit-slider-thumb {
            opacity: 1;
        }
        input[type="range"]::-moz-range-track {
            background: transparent;
        }
        input[type="range"]::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border: none;
            border-radius: 50%;
            background: #fff;
            opacity: 0;
            transition: opacity 0.1s;
        }
        input[type="range"]:hover::-moz-range-thumb {
            opacity: 1;
        }

        /* Generic styles */
        .loading, .empty-state {
            padding: 20px;
            text-align: center;
            color: #b3b3b3;
            font-size: 13px;
            line-height: 1.5;
        }
        .empty-state code {
            background-color: #282828;
            padding: 2px 6px;
            border-radius: 4px;
            color: #1db954;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #888;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="#1db954">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
                <path d="M9 17V9l7-2v8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <circle cx="8" cy="17" r="2" fill="currentColor"/>
                <circle cx="14" cy="15" r="2" fill="currentColor"/>
            </svg>
            <span>WebPlayer</span>
        </div>
        <div class="menu-item active">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            Home
        </div>
        <div class="playlist-section">
            <div class="section-title">Your Playlist</div>
            <div id="playlist" class="playlist-list">
                <div class="loading">Scanning /songs/ directory...</div>
            </div>
        </div>
    </div>

    <!-- Main Window Area -->
    <div class="main-content">
        <div class="now-playing-jumbo">
            <div class="album-art-large">
                <svg viewBox="0 0 24 24" fill="currentColor" width="100" height="100">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/>
                </svg>
            </div>
            <div class="track-details">
                <span class="type-label">PLAYLIST</span>
                <h1 id="jumbo-title">No Track Selected</h1>
                <p id="jumbo-subtitle">Please select a file to begin playback.</p>
            </div>
        </div>
    </div>

    <!-- Global Player Bar -->
    <div class="player-bar">
        <!-- Now Playing Widget (Left) -->
        <div class="now-playing-bar-left">
            <div class="mini-art">
                <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
                    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                </svg>
            </div>
            <div class="track-info">
                <div class="track-name" id="player-track-name">No track playing</div>
                <div class="track-artist" id="player-track-artist">Local File</div>
            </div>
        </div>

        <!-- Controls & Track Seek (Center) -->
        <div class="now-playing-bar-center">
            <div class="controls">
                <button id="btn-shuffle" class="control-btn" title="Shuffle">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.45 20 9.5V4h-5.5zm.38 9.44l-1.41 1.41 3.56 3.56L15 20h5v-5l-2.04 2.04-3.08-3.04z"/></svg>
                </button>
                <button id="btn-prev" class="control-btn" title="Previous">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button id="btn-play-pause" class="control-btn play-pause-btn" title="Play">
                    <svg id="play-icon" viewBox="0 0 24 24" width="20" height="20" fill="black"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" viewBox="0 0 24 24" width="20" height="20" fill="black" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button id="btn-next" class="control-btn" title="Next">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M6 18l8.5-6L6 6zm9-12v12h2V6z"/></svg>
                </button>
                <button id="btn-repeat" class="control-btn" title="Repeat">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
                </button>
            </div>
            <div class="progress-container">
                <span class="time" id="time-current">0:00</span>
                <input type="range" id="progress-bar" value="0" min="0" max="100">
                <span class="time" id="time-duration">0:00</span>
            </div>
        </div>

        <!-- Volume Controller (Right) -->
        <div class="now-playing-bar-right">
            <div class="volume-container">
                <button id="btn-mute" class="control-btn-volume" title="Mute/Unmute">
                    <svg id="volume-icon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    <svg id="mute-icon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor" style="display:none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                </button>
                <input type="range" id="volume-bar" value="80" min="0" max="100">
            </div>
        </div>
    </div>
</div>

<script>
    const audio = new Audio();
    let songs = [];
    let currentIndex = -1;
    let isShuffle = false;
    let isRepeat = false;
    let previousVolume = 0.8;

    // DOM References
    const playlistEl = document.getElementById('playlist');
    const jumboTitle = document.getElementById('jumbo-title');
    const jumboSubtitle = document.getElementById('jumbo-subtitle');
    const playerTrackName = document.getElementById('player-track-name');
    const progressBar = document.getElementById('progress-bar');
    const volumeBar = document.getElementById('volume-bar');
    const timeCurrent = document.getElementById('time-current');
    const timeDuration = document.getElementById('time-duration');

    const btnPlayPause = document.getElementById('btn-play-pause');
    const playIcon = document.getElementById('play-icon');
    const pauseIcon = document.getElementById('pause-icon');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const btnShuffle = document.getElementById('btn-shuffle');
    const btnRepeat = document.getElementById('btn-repeat');
    const btnMute = document.getElementById('btn-mute');
    const volumeIcon = document.getElementById('volume-icon');
    const muteIcon = document.getElementById('mute-icon');

    // Read the statically generated JSON file
    async function init() {
        try {
            const response = await fetch('./songs.json');
            if (!response.ok) {
                throw new Error("Could not load songs.json. Run build script first.");
            }
            const fileNames = await response.json();
            
            songs = fileNames.map(fileName => {
                const title = fileName.replace(/\.m4a$/i, '').replace(/[_-]/g, ' ');
                // Build a safe URL to the track inside the songs folder
                const resolvedUrl = new URL(`songs/${encodeURIComponent(fileName)}`, window.location.href).toString();
                return {
                    url: resolvedUrl,
                    title: title
                };
            });

            if (songs.length === 0) {
                playlistEl.innerHTML = `<div class="empty-state">No <code>.m4a</code> files found in the <code>songs/</code> folder.<br>Add some music, run the build script, and deploy!</div>`;
                return;
            }

            renderPlaylist();
            loadTrack(0, false); 
            updateSliderBackground(progressBar);
            updateSliderBackground(volumeBar);
        } catch (err) {
            console.error(err);
            playlistEl.innerHTML = `<div class="empty-state">Unable to load music. Ensure the build script generated <code>songs.json</code> correctly.</div>`;
        }
    }

    function renderPlaylist() {
        playlistEl.innerHTML = '';
        songs.forEach((song, idx) => {
            const item = document.createElement('div');
            item.className = 'playlist-item';
            if (idx === currentIndex) item.classList.add('active');
            item.innerHTML = `
                <span class="track-index">${idx + 1}</span>
                <div class="track-meta">
                    <div class="track-title">${song.title}</div>
                    <div class="track-sub">Local Track</div>
                </div>
            `;
            item.addEventListener('click', () => {
                loadTrack(idx, true);
            });
            playlistEl.appendChild(item);
        });
    }

    function loadTrack(index, shouldPlay = true) {
        if (index < 0 || index >= songs.length) return;
        currentIndex = index;
        const track = songs[currentIndex];

        audio.src = track.url;
        audio.load();

        document.querySelectorAll('.playlist-item').forEach((item, idx) => {
            if (idx === currentIndex) {
                item.classList.add('active');
                item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } else {
                item.classList.remove('active');
            }
        });

        playerTrackName.textContent = track.title;
        jumboTitle.textContent = track.title;
        jumboSubtitle.textContent = "Playing from library";

        progressBar.value = 0;
        updateSliderBackground(progressBar);
        timeCurrent.textContent = "0:00";
        timeDuration.textContent = "0:00";

        if (shouldPlay) {
            playTrack();
        } else {
            pauseTrack();
        }
    }

    function playTrack() {
        audio.play()
            .then(() => {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            })
            .catch(err => {
                console.log("Playback interrupted. Press play manually.", err);
            });
    }

    function pauseTrack() {
        audio.pause();
        playIcon.style.display = 'block';
        pauseIcon.style.display = 'none';
    }

    function togglePlay() {
        if (audio.paused) {
            playTrack();
        } else {
            pauseTrack();
        }
    }

    function nextTrack() {
        if (songs.length === 0) return;
        if (isShuffle) {
            let randomIndex = Math.floor(Math.random() * songs.length);
            while (randomIndex === currentIndex && songs.length > 1) {
                randomIndex = Math.floor(Math.random() * songs.length);
            }
            loadTrack(randomIndex, true);
        } else {
            let nextIndex = currentIndex + 1;
            if (nextIndex >= songs.length) nextIndex = 0;
            loadTrack(nextIndex, true);
        }
    }

    function prevTrack() {
        if (songs.length === 0) return;
        let prevIndex = currentIndex - 1;
        if (prevIndex < 0) prevIndex = songs.length - 1;
        loadTrack(prevIndex, true);
    }

    function updateSliderBackground(slider) {
        const val = (slider.value - slider.min) / (slider.max - slider.min) * 100;
        slider.style.background = `linear-gradient(to right, #1db954 ${val}%, #535353 ${val}%)`;
    }

    audio.addEventListener('timeupdate', () => {
        if (!isNaN(audio.duration)) {
            const progress = (audio.currentTime / audio.duration) * 100;
            progressBar.value = progress;
            updateSliderBackground(progressBar);
            timeCurrent.textContent = formatTime(audio.currentTime);
            timeDuration.textContent = formatTime(audio.duration);
        }
    });

    audio.addEventListener('loadedmetadata', () => {
        timeDuration.textContent = formatTime(audio.duration);
    });

    audio.addEventListener('ended', () => {
        if (isRepeat) {
            audio.currentTime = 0;
            playTrack();
        } else {
            nextTrack();
        }
    });

    progressBar.addEventListener('input', () => {
        if (!isNaN(audio.duration)) {
            const seekTime = (progressBar.value / 100) * audio.duration;
            audio.currentTime = seekTime;
            updateSliderBackground(progressBar);
        }
    });

    volumeBar.addEventListener('input', () => {
        const vol = volumeBar.value / 100;
        audio.volume = vol;
        updateSliderBackground(volumeBar);
        if (vol === 0) {
            muteIcon.style.display = 'block';
            volumeIcon.style.display = 'none';
        } else {
            muteIcon.style.display = 'none';
            volumeIcon.style.display = 'block';
        }
    });

    btnMute.addEventListener('click', () => {
        if (audio.volume > 0) {
            previousVolume = audio.volume;
            audio.volume = 0;
            volumeBar.value = 0;
            updateSliderBackground(volumeBar);
            muteIcon.style.display = 'block';
            volumeIcon.style.display = 'none';
        } else {
            audio.volume = previousVolume;
            volumeBar.value = previousVolume * 100;
            updateSliderBackground(volumeBar);
            muteIcon.style.display = 'none';
            volumeIcon.style.display = 'block';
        }
    });

    btnShuffle.addEventListener('click', () => {
        isShuffle = !isShuffle;
        btnShuffle.classList.toggle('active-state', isShuffle);
    });

    btnRepeat.addEventListener('click', () => {
        isRepeat = !isRepeat;
        btnRepeat.classList.toggle('active-state', isRepeat);
    });

    btnPlayPause.addEventListener('click', togglePlay);
    btnNext.addEventListener('click', nextTrack);
    btnPrev.addEventListener('click', prevTrack);

    function formatTime(secs) {
        const minutes = Math.floor(secs / 60);
        const seconds = Math.floor(secs % 60);
        return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
    }

    if ('mediaSession' in navigator) {
        audio.addEventListener('play', () => {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: songs[currentIndex]?.title || 'Web Music Track',
                artist: 'Library'
            });
            navigator.mediaSession.playbackState = 'playing';
        });
        audio.addEventListener('pause', () => {
            navigator.mediaSession.playbackState = 'paused';
        });
        navigator.mediaSession.setActionHandler('play', playTrack);
        navigator.mediaSession.setActionHandler('pause', pauseTrack);
        navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
        navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
    }

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            togglePlay();
        } else if (e.code === 'ArrowRight') {
            audio.currentTime = Math.min(audio.duration, audio.currentTime + 5);
        } else if (e.code === 'ArrowLeft') {
            audio.currentTime = Math.max(0, audio.currentTime - 5);
        }
    });

    init();
</script>
</body>
</html>
